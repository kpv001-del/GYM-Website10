<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .error {
      color: red;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Iron Pulse Gym</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
        <li class="nav-item"><a class="nav-link" href="classes.html">Classes</a></li>
        <li class="nav-item"><a class="nav-link" href="trainers.html">Trainers</a></li>
        <li class="nav-item"><a class="nav-link" href="membership.html">Membership</a></li>
        <li class="nav-item"><a class="nav-link active" href="registration.html">Register</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
      </ul>
    </div>
  </div>
</nav>
<section class="registration py-5">
  <div class="container">
    <h1 class="text-center mb-4 text-uppercase fw-bold text-primary" style="font-size: 2.5rem; text-shadow: 1px 1px 2px gray;">
       Gym Registration Form
    </h1>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <form id="registrationForm" onsubmit="return validateForm()">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="name">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email">
          </div>
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="age">
          </div>
          <div class="mb-3">
            <label class="form-label">Gender</label><br>
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
          </div>
          <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea class="form-control" id="address" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="1234567890">
          </div>
          <div class="mb-3">
            <label class="form-label">Preferred Workout Time</label>
            <select class="form-select" id="workout_time">
              <option value="">Select</option>
              <option value="Morning">Morning</option>
              <option value="Afternoon">Afternoon</option>
              <option value="Evening">Evening</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Fitness Goals</label><br>
            <input type="checkbox" name="goals" value="Weight Loss"> Weight Loss
            <input type="checkbox" name="goals" value="Muscle Building"> Muscle Building
            <input type="checkbox" name="goals" value="Cardio"> Cardio
            <input type="checkbox" name="goals" value="Flexibility"> Flexibility
          </div>
          <div class="mb-3">
            <label class="form-label">Membership Type</label>
            <select class="form-select" id="membership">
              <option value="">Select</option>
              <option value="Monthly">Monthly</option>
              <option value="Quarterly">Quarterly</option>
              <option value="Yearly">Yearly</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>
      </div>
    </div>
  </div>
</section>
<footer class="bg-dark text-white text-center py-4">
  <p>&copy; 2025 Iron Pulse Gym| Follow us on
    <a href="#" class="text-white">Instagram</a>, <a href="#" class="text-white">Facebook</a>
  </p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function validateForm() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const age = document.getElementById("age").value.trim();
    const gender = document.querySelector('input[name="gender"]:checked');
    const address = document.getElementById("address").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const workout = document.getElementById("workout_time").value;
    const membership = document.getElementById("membership").value;
    const goals = document.querySelectorAll('input[name="goals"]:checked');

    const nameRegex = /^[A-Za-z\s]+$/;
    const emailRegex = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
    const phoneRegex = /^\d{10}$/;

    if (name === "" || email === "" || age === "" || !gender || address === "" || phone === "" || workout === "" || membership === "") {
      alert("Please fill out all fields.");
      return false;
    }

    if (!nameRegex.test(name)) {
      alert("Name should only contain letters and spaces.");
      return false;
    }

    if (!emailRegex.test(email)) {
      alert("Please enter a valid email address.");
      return false;
    }

    if (!phoneRegex.test(phone)) {
      alert("Phone number must be exactly 10 digits.");
      return false;
    }

    if (goals.length === 0) {
      alert("Please select at least one fitness goal.");
      return false;
    }

    alert("✅ Form submitted successfully!");
    return true;
  }
</script>

</body>
</html>
